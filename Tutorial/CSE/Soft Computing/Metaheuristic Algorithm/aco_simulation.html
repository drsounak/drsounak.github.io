<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACO Dry Run — 8-Node TSP</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --panel: #0d1420;
  --border: #1a2540;
  --node-idle: #1e3a5f;
  --node-stroke: #2d6aad;
  --node-active: #00d4ff;
  --node-visited: #0066aa;
  --ant: #ffd700;
  --edge-idle: rgba(45,106,173,0.18);
  --edge-near: rgba(45,106,173,0.5);
  --edge-tour: #22d47a;
  --edge-pheromone: #ff6b35;
  --text: #c8deff;
  --muted: #4a6080;
  --accent: #00d4ff;
  --green: #22d47a;
  --gold: #ffd700;
  --orange: #ff6b35;
  --red: #ff4466;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow-x: hidden;
}

/* scanline overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.012) 2px, rgba(0,212,255,0.012) 4px);
  pointer-events: none;
  z-index: 999;
}

header {
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(13,20,32,0.9);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 15px;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.phase-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: all 0.4s;
}

.phase-label span {
  color: var(--accent);
  font-weight: 600;
}

.main {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 0;
  min-height: 0;
}

/* ── Canvas ─────────────────────────────── */
.canvas-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
}

#tsp-svg {
  width: 100%;
  max-width: 560px;
  height: auto;
  overflow: visible;
}

/* ── Right Panel ─────────────────────────── */
.panel {
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.section {
  border-bottom: 1px solid var(--border);
  padding: 16px 18px;
}

.section-label {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* Params */
.params {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.param {
  background: rgba(0,212,255,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
}

.param-name {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 3px;
}

.param-val {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
}

/* Log */
.log-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 12px 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.log-wrap::-webkit-scrollbar { width: 4px; }
.log-wrap::-webkit-scrollbar-track { background: transparent; }
.log-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.log-entry {
  font-size: 11px;
  line-height: 1.6;
  padding: 7px 10px;
  border-radius: 5px;
  border-left: 2px solid transparent;
  opacity: 0;
  transform: translateX(8px);
  transition: opacity 0.35s, transform 0.35s;
}

.log-entry.show { opacity: 1; transform: translateX(0); }
.log-entry.info  { border-color: var(--accent); background: rgba(0,212,255,0.05); }
.log-entry.move  { border-color: var(--gold);   background: rgba(255,215,0,0.05); }
.log-entry.pher  { border-color: var(--orange); background: rgba(255,107,53,0.05); }
.log-entry.done  { border-color: var(--green);  background: rgba(34,212,122,0.06); }
.log-entry.evap  { border-color: var(--muted);  background: rgba(74,96,128,0.06); }

.log-entry .lt { color: var(--muted); font-size: 9px; margin-bottom: 2px; }
.log-entry .lv { color: var(--text); }
.log-entry .lv b { font-weight: 600; }
.log-val { float: right; font-weight: 600; }

/* Tour stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
}

.stat-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  text-align: center;
}

.stat-name { font-size: 9px; color: var(--muted); margin-bottom: 4px; }
.stat-val  { font-size: 17px; font-weight: 700; }
.stat-val.g { color: var(--green); }
.stat-val.a { color: var(--gold); }
.stat-val.o { color: var(--orange); }

/* Pheromone table */
.pher-table {
  width: 100%;
  font-size: 10px;
  border-collapse: collapse;
}

.pher-table th {
  color: var(--muted);
  font-weight: 400;
  text-align: left;
  padding: 3px 6px;
  border-bottom: 1px solid var(--border);
}

.pher-table td {
  padding: 4px 6px;
  border-bottom: 1px solid rgba(26,37,64,0.5);
  transition: all 0.5s;
}

.pher-table td.highlight {
  color: var(--orange);
  font-weight: 600;
}

/* ── Controls ───────────────────────────── */
footer {
  border-top: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(13,20,32,0.95);
}

.step-info {
  font-size: 11px;
  color: var(--muted);
  flex: 1;
}

.step-info span { color: var(--accent); }

.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 9px 20px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px solid;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

.btn-primary:hover { background: #33dfff; }
.btn-primary:disabled { background: var(--muted); border-color: var(--muted); cursor: not-allowed; }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border-color: var(--border);
}

.btn-ghost:hover { color: var(--text); border-color: var(--text); }

.progress-bar {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}

/* SVG styles */
.edge-line {
  stroke: var(--edge-idle);
  stroke-width: 1;
  transition: stroke 0.5s, stroke-width 0.5s, stroke-opacity 0.5s;
}

.edge-line.near   { stroke: var(--edge-near); stroke-width: 1.5; }
.edge-line.tour   { stroke: var(--edge-tour); stroke-width: 2.5; filter: drop-shadow(0 0 4px rgba(34,212,122,0.5)); }
.edge-line.pheromone { stroke: var(--edge-pheromone); stroke-width: 3.5; filter: drop-shadow(0 0 6px rgba(255,107,53,0.6)); }

.node-circle {
  fill: var(--node-idle);
  stroke: var(--node-stroke);
  stroke-width: 1.5;
  transition: all 0.4s;
}

.node-circle.active {
  fill: var(--node-active);
  stroke: var(--node-active);
  filter: drop-shadow(0 0 10px rgba(0,212,255,0.9));
}

.node-circle.visited {
  fill: rgba(0,102,170,0.6);
  stroke: #2d6aad;
}

.node-circle.start {
  stroke: var(--green);
  stroke-width: 2.5;
}

.node-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  fill: var(--text);
  text-anchor: middle;
  dominant-baseline: middle;
  pointer-events: none;
}

#ant-dot {
  fill: var(--gold);
  filter: drop-shadow(0 0 8px rgba(255,215,0,0.9));
  transition: all 0.08s;
}

.prob-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  fill: rgba(255,215,0,0.8);
  text-anchor: middle;
  opacity: 0;
  transition: opacity 0.3s;
}

.prob-label.show { opacity: 1; }

/* Step counter pills */
.step-pills {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
}

.pill {
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.pill.done  { border-color: var(--green); color: var(--green); }
.pill.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }

@keyframes pulse-ring {
  0%   { r: 14; opacity: 0.8; }
  100% { r: 22; opacity: 0; }
}

.pulse { animation: pulse-ring 1.2s ease-out infinite; fill: none; stroke: var(--accent); stroke-width: 1.5; }

@keyframes ant-bounce {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.3); }
}

</style>
</head>
<body>

<header>
  <div class="logo">ACO / TSP &mdash; Dry Run</div>
  <div class="phase-label" id="phase-label">Phase: <span>Initializing</span></div>
</header>

<div class="main">

  <!-- ── Graph Canvas ── -->
  <div class="canvas-wrap">
    <svg id="tsp-svg" viewBox="0 0 500 500">
      <defs>
        <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
          <polygon points="0 0, 6 2, 0 4" fill="var(--edge-tour)" />
        </marker>
      </defs>
      <g id="edges-g"></g>
      <g id="prob-labels-g"></g>
      <g id="nodes-g"></g>
      <circle id="ant-pulse" class="pulse" cx="-50" cy="-50" r="14"/>
      <circle id="ant-dot" r="7" cx="-50" cy="-50"/>
    </svg>
  </div>

  <!-- ── Right Panel ── -->
  <div class="panel">

    <div class="section">
      <div class="section-label">Parameters</div>
      <div class="params">
        <div class="param"><div class="param-name">α (pheromone)</div><div class="param-val">2.0</div></div>
        <div class="param"><div class="param-name">β (heuristic)</div><div class="param-val">2.0</div></div>
        <div class="param"><div class="param-name">ρ (evaporation)</div><div class="param-val">0.1</div></div>
        <div class="param"><div class="param-name">τ₀ (initial)</div><div class="param-val">1.0</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Iteration Status</div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-name">Tour Length</div>
          <div class="stat-val g" id="stat-tour">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-name">Δτ deposit</div>
          <div class="stat-val a" id="stat-delta">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-name">Step</div>
          <div class="stat-val o" id="stat-step">0/8</div>
        </div>
      </div>
    </div>

    <div class="step-pills" id="pills"></div>

    <div class="section">
      <div class="section-label">Pheromone Update</div>
      <table class="pher-table">
        <thead><tr><th>Arc</th><th>τ before</th><th>after evap</th><th>final τ</th></tr></thead>
        <tbody id="pher-tbody">
          <tr><td colspan="4" style="color:var(--muted);padding:8px 6px;font-size:10px">Awaiting tour completion…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="log-wrap" id="log"></div>
  </div>
</div>

<footer>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="step-info">Step <span id="fi-step">0</span> of <span id="fi-total">—</span></div>
  <button class="btn btn-ghost" id="btn-reset" onclick="reset()">Reset</button>
  <button class="btn btn-primary" id="btn-next" onclick="nextStep()">Start ›</button>
</footer>

<script>
// ── Data ──────────────────────────────────────────────────────────
const N = 8;
const CX = 250, CY = 250, R = 175;
const nodes = [];
for (let i = 0; i < N; i++) {
  const a = (i / N) * Math.PI * 2 - Math.PI / 2;
  nodes.push({ id: i + 1, x: CX + R * Math.cos(a), y: CY + R * Math.sin(a) });
}

// Distance matrix (1-indexed access via d[i-1][j-1])
const dist = [];
for (let i = 0; i < N; i++) {
  dist.push([]);
  for (let j = 0; j < N; j++) {
    if (i === j) { dist[i].push(0); continue; }
    const gap = Math.abs(i - j);
    dist[i].push((gap === 1 || gap === N - 1) ? 10 : 20);
  }
}

const tourSeq = [0,1,2,3,4,5,6,7]; // 0-indexed
const ALPHA = 2, BETA = 2, RHO = 0.1;
const tourCost = 80;
const deltaTau = 1 / tourCost;
const afterEvap = 1.0 * (1 - RHO);
const tourFinal = +(afterEvap + deltaTau).toFixed(4);
const nonFinal  = +afterEvap.toFixed(4);

// Transition probabilities from the report
const probLog = [
  { from: 1, to: 2, prob: '0.307', cost: 10, feas: '{2,3,4,5,6,7,8}' },
  { from: 2, to: 3, prob: '0.444', cost: 10, feas: '{3,4,5,6,7,8}' },
  { from: 3, to: 4, prob: '0.500', cost: 10, feas: '{4,5,6,7,8}' },
  { from: 4, to: 5, prob: '0.571', cost: 10, feas: '{5,6,7,8}' },
  { from: 5, to: 6, prob: '0.667', cost: 10, feas: '{6,7,8}' },
  { from: 6, to: 7, prob: '0.800', cost: 10, feas: '{7,8}' },
  { from: 7, to: 8, prob: '1.000', cost: 10, feas: '{8}' },
  { from: 8, to: 1, prob: '1.000', cost: 10, feas: '{1}' },
];

// ── SVG Setup ─────────────────────────────────────────────────────
const svg = document.getElementById('tsp-svg');
const edgesG = document.getElementById('edges-g');
const nodesG = document.getElementById('nodes-g');
const probG  = document.getElementById('prob-labels-g');
const antDot = document.getElementById('ant-dot');
const antPulse = document.getElementById('ant-pulse');
const edgeEls = {}, probEls = {};

// Draw all edges
for (let i = 0; i < N; i++) {
  for (let j = i + 1; j < N; j++) {
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", nodes[i].x); line.setAttribute("y1", nodes[i].y);
    line.setAttribute("x2", nodes[j].x); line.setAttribute("y2", nodes[j].y);
    line.classList.add('edge-line');
    const d = dist[i][j];
    line.style.strokeWidth = d === 10 ? '1.5' : '0.5';
    edgesG.appendChild(line);
    edgeEls[`${i}-${j}`] = line;
    edgeEls[`${j}-${i}`] = line;
  }
}

// Probability mid-labels
for (let i = 0; i < N; i++) {
  const j = (i + 1) % N;
  const mx = (nodes[i].x + nodes[j].x) / 2;
  const my = (nodes[i].y + nodes[j].y) / 2;
  const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
  t.setAttribute("x", mx); t.setAttribute("y", my - 8);
  t.classList.add('prob-label');
  t.id = `prob-${i}-${j}`;
  probG.appendChild(t);
  probEls[`${i}-${j}`] = t;
}

// Draw nodes
const nodeEls = [];
nodes.forEach((n, i) => {
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("transform", `translate(${n.x},${n.y})`);

  const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  c.setAttribute("r", "16"); c.classList.add('node-circle');
  if (i === 0) c.classList.add('start');

  const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
  t.classList.add('node-label'); t.textContent = n.id;

  g.appendChild(c); g.appendChild(t);
  nodesG.appendChild(g);
  nodeEls.push({ g, c, t });
});

// ── Steps definition ─────────────────────────────────────────────
const STEPS = [
  { id: 'init',    label: 'Init',    phase: 'Initialization' },
  ...probLog.map((p,i) => ({ id: `move${i}`, label: `Move ${p.from}→${p.to}`, phase: 'Forward Phase' })),
  { id: 'loop',    label: 'Loop Check', phase: 'Loop Elimination' },
  { id: 'eval',    label: 'Evaluate', phase: 'Evaluation' },
  { id: 'evap',    label: 'Evaporate', phase: 'Backward Phase' },
  { id: 'deposit', label: 'Deposit',  phase: 'Backward Phase' },
  { id: 'summary', label: 'Summary', phase: 'Complete' },
];

let stepIdx = -1;
let cumulativeCost = 0;
let running = false;

// ── Pills ─────────────────────────────────────────────────────────
const pillsEl = document.getElementById('pills');
STEPS.forEach((s, i) => {
  const p = document.createElement('div');
  p.className = 'pill'; p.textContent = s.label; p.id = `pill-${i}`;
  pillsEl.appendChild(p);
});

document.getElementById('fi-total').textContent = STEPS.length;

// ── Logging ───────────────────────────────────────────────────────
function log(type, title, val) {
  const el = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.innerHTML = `<div class="lt">${title}</div><div class="lv">${val}</div>`;
  document.getElementById('log').appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// ── Ant animation ─────────────────────────────────────────────────
function moveAnt(nodeIdx, dur = 700) {
  return new Promise(res => {
    const { x, y } = nodes[nodeIdx];
    const sx = parseFloat(antDot.getAttribute("cx"));
    const sy = parseFloat(antDot.getAttribute("cy"));
    let start = null;
    function frame(ts) {
      if (!start) start = ts;
      const p = Math.min((ts - start) / dur, 1);
      const ex = p < 0.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
      antDot.setAttribute("cx", sx + (x - sx) * ex);
      antDot.setAttribute("cy", sy + (y - sy) * ex);
      antPulse.setAttribute("cx", sx + (x - sx) * ex);
      antPulse.setAttribute("cy", sy + (y - sy) * ex);
      if (p < 1) requestAnimationFrame(frame); else res();
    }
    requestAnimationFrame(frame);
  });
}

// ── Step executor ─────────────────────────────────────────────────
async function executeStep(i) {
  const s = STEPS[i];
  document.getElementById('phase-label').innerHTML = `Phase: <span>${s.phase}</span>`;
  document.getElementById('stat-step').textContent = `${i}/${STEPS.length - 1}`;
  document.getElementById('prog').style.width = `${(i / (STEPS.length - 1)) * 100}%`;
  document.getElementById('fi-step').textContent = i + 1;

  // Update pills
  document.querySelectorAll('.pill').forEach((p, j) => {
    p.classList.remove('active','done');
    if (j < i) p.classList.add('done');
    if (j === i) p.classList.add('active');
  });

  if (s.id === 'init') {
    antDot.setAttribute("cx", nodes[0].x);
    antDot.setAttribute("cy", nodes[0].y);
    antPulse.setAttribute("cx", nodes[0].x);
    antPulse.setAttribute("cy", nodes[0].y);
    nodeEls[0].c.classList.add('active');
    log('info', 'Initialization', 'τ₀ = 1.0 on all edges. Ant placed at City 1. M_k = {1}');
    log('info', 'Parameters', 'α=2.0 · β=2.0 · ρ=0.1 · Q=1');
  }
  else if (s.id.startsWith('move')) {
    const mi = parseInt(s.id.replace('move',''));
    const p = probLog[mi];
    const fi = p.from - 1, ti = p.to - 1;

    // highlight feasible neighborhood edges
    for (let k = 0; k < N; k++) {
      if (k === fi) continue;
      const visited = tourSeq.slice(0, mi + 1).includes(k);
      if (!visited) {
        const key = fi < k ? `${fi}-${k}` : `${k}-${fi}`;
        if (edgeEls[key]) edgeEls[key].classList.add('near');
      }
    }

    await moveAnt(ti, 750);
    cumulativeCost += p.cost;
    document.getElementById('stat-tour').textContent = cumulativeCost;

    // mark chosen edge as tour
    const key = fi < ti ? `${fi}-${ti}` : `${ti}-${fi}`;
    if (edgeEls[key]) { edgeEls[key].classList.remove('near'); edgeEls[key].classList.add('tour'); }

    // remove near from others
    for (let k = 0; k < N; k++) {
      if (k === fi || k === ti) continue;
      const ek = fi < k ? `${fi}-${k}` : `${k}-${fi}`;
      if (edgeEls[ek]) edgeEls[ek].classList.remove('near');
    }

    // prob label on tour edge
    const pk = `${fi}-${ti}`;
    if (probEls[pk]) { probEls[pk].textContent = `p=${p.prob}`; probEls[pk].classList.add('show'); }

    nodeEls[fi].c.classList.remove('active'); nodeEls[fi].c.classList.add('visited');
    nodeEls[ti].c.classList.add('active');

    log('move', `Step ${mi+1} · Node ${p.from} → ${p.to}`,
      `N<sub>${p.from}</sub><sup>k</sup> = ${p.feas} · p = <b>${p.prob}</b> · cost = ${p.cost}`);
  }
  else if (s.id === 'loop') {
    log('info', 'Loop Elimination Scan', 'Tour: [1→2→3→4→5→6→7→8→1]');
    log('info', 'Scan Result', 'No duplicate nodes found. Path is <b>loop-free</b>. ✓');
  }
  else if (s.id === 'eval') {
    // close tour back to node 0
    await moveAnt(0, 600);
    nodeEls[N-1].c.classList.remove('active'); nodeEls[N-1].c.classList.add('visited');
    nodeEls[0].c.classList.add('active');

    document.getElementById('stat-tour').textContent = tourCost;
    document.getElementById('stat-delta').textContent = deltaTau.toFixed(4);
    log('done', 'Tour Complete', `L_k = 10 × 8 = <b>${tourCost}</b>`);
    log('done', 'Δτ Calculated', `1 / L_k = 1 / 80 = <b>${deltaTau.toFixed(4)}</b>`);
    log('done', 'Hamiltonian Circuit', '[1→2→3→4→5→6→7→8→1] verified ✓');
  }
  else if (s.id === 'evap') {
    log('evap', 'Pheromone Evaporation', `τ_ij ← (1 − ρ) · τ_ij = (1 − 0.1) · 1.0 = <b>0.9</b>`);
    log('evap', 'Applied to ALL edges', `28 arcs updated. τ_ij = <b>0.9000</b>`);
  }
  else if (s.id === 'deposit') {
    // Animate pheromone highlight on tour edges
    for (let i = 0; i < N; i++) {
      const j = (i + 1) % N;
      const key = i < j ? `${i}-${j}` : `${j}-${i}`;
      if (edgeEls[key]) {
        setTimeout(() => edgeEls[key].classList.add('pheromone'), i * 80);
      }
    }
    // Update pheromone table
    const tbody = document.getElementById('pher-tbody');
    tbody.innerHTML = '';
    const rows = [
      { arc: '1–2 (tour)', init: '1.0', evap: '0.9000', dep: `+${deltaTau.toFixed(4)}`, final: tourFinal, tour: true },
      { arc: '1–3 (non)', init: '1.0', evap: '0.9000', dep: '+0', final: nonFinal, tour: false },
      { arc: '2–4 (non)', init: '1.0', evap: '0.9000', dep: '+0', final: nonFinal, tour: false },
      { arc: '…all tour arcs', init: '1.0', evap: '0.9000', dep: `+${deltaTau.toFixed(4)}`, final: tourFinal, tour: true },
    ];
    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${r.arc}</td><td>${r.init}</td><td>${r.evap}</td><td class="${r.tour?'highlight':''}">${r.final}</td>`;
      tbody.appendChild(tr);
    });
    log('pher', 'Pheromone Deposit', `Tour arcs: τ_ij ← 0.9 + ${deltaTau.toFixed(4)} = <b>${tourFinal}</b>`);
    log('pher', 'Non-tour arcs', `τ_ij stays at <b>${nonFinal}</b> (no deposit)`);
    log('pher', 'Differential', `Tour arcs ≈ <b>1.4%</b> more attractive than non-tour arcs`);
  }
  else if (s.id === 'summary') {
    antPulse.setAttribute("cx", -50); antPulse.setAttribute("cy", -50);
    log('done', 'Iteration 1 Complete', 'Environment updated. Nascent pheromone signal established.');
    log('done', 'Stigmergy', `Ant deposited ${deltaTau.toFixed(4)} units → modified search space density`);
    log('done', 'Autocatalysis', 'Positive feedback loop initiated. ρ=0.1 prevents stagnation trap.');
    log('done', 'Heuristic Bias', 'η guided ant to 10-unit arcs over 20-unit arcs (4× preference)');
    document.getElementById('btn-next').disabled = true;
    document.getElementById('prog').style.width = '100%';
    document.querySelectorAll('.pill').forEach(p => p.classList.add('done'));
  }
}

// ── Controls ──────────────────────────────────────────────────────
async function nextStep() {
  if (running) return;
  running = true;
  document.getElementById('btn-next').disabled = true;
  stepIdx++;
  await executeStep(stepIdx);
  running = false;
  if (stepIdx < STEPS.length - 1) {
    document.getElementById('btn-next').disabled = false;
    document.getElementById('btn-next').textContent = 'Next ›';
  }
}

function reset() {
  stepIdx = -1; cumulativeCost = 0; running = false;
  antDot.setAttribute("cx", -50); antDot.setAttribute("cy", -50);
  antPulse.setAttribute("cx", -50); antPulse.setAttribute("cy", -50);
  nodeEls.forEach((n, i) => {
    n.c.classList.remove('active','visited');
    if (i === 0) n.c.classList.add('start');
  });
  Object.values(edgeEls).forEach(e => e.classList.remove('tour','near','pheromone'));
  Object.values(probEls).forEach(t => { t.textContent=''; t.classList.remove('show'); });
  document.getElementById('log').innerHTML = '';
  document.getElementById('stat-tour').textContent = '—';
  document.getElementById('stat-delta').textContent = '—';
  document.getElementById('stat-step').textContent = '0/8';
  document.getElementById('prog').style.width = '0%';
  document.getElementById('fi-step').textContent = '0';
  document.getElementById('pher-tbody').innerHTML = '<tr><td colspan="4" style="color:var(--muted);padding:8px 6px;font-size:10px">Awaiting tour completion…</td></tr>';
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active','done'));
  document.getElementById('btn-next').disabled = false;
  document.getElementById('btn-next').textContent = 'Start ›';
  document.getElementById('phase-label').innerHTML = 'Phase: <span>Initializing</span>';
}
</script>
